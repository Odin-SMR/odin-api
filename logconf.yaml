version: 1
disable_existing_loggers: False

formatters:
  standard:
    format: "[%(levelname)s] %(name)s: %(message)s"

handlers:
  default:
    level: DEBUG
    formatter: standard
    class: logging.StreamHandler
    stream: ext://flask.logging.wsgi_errors_stream

root:
  level: WARNING
  handlers:
    - default

loggers:
  odinapi:
    level: DEBUG

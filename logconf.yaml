version: 1
disable_existing_loggers: False

formatters:
  json:
    format: >
      {"time":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s",
       "message":"%(message)s","pid":%(process)d,"thread":"%(threadName)s"}

handlers:
  default:
    level: INFO
    formatter: json
    class: logging.StreamHandler
    stream: ext://flask.logging.wsgi_errors_stream

root:
  level: INFO
  handlers:
    - default

loggers:
  odinapi:
    level: DEBUG

  gunicorn.error:
    level: INFO
    handlers: [default]
    propagate: 0

  gunicorn.access:
    level: INFO
    handlers: [default]
    propagate: 0
